<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <script src="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.0/maps/maps-web.min.js"></script>
    <link rel="stylesheet" href="https://api.tomtom.com/maps-sdk-for-web/cdn/6.x/6.25.0/maps/maps-web.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        let map;
        let mapReady = false;

        if (!window.tomtomKey) {
            console.warn("Missing window.tomtomKey");
        }

        function createPinImage(color, callback) {
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="48" viewBox="0 0 36 48">
                  <defs>
                    <filter id="shadow" x="-30%" y="-10%" width="160%" height="140%">
                      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.35)"/>
                    </filter>
                  </defs>
                  <!-- Teardrop body -->
                  <path d="M18 2 C9.16 2 2 9.16 2 18 C2 28 18 46 18 46 C18 46 34 28 34 18 C34 9.16 26.84 2 18 2 Z"
                        fill="${color}" filter="url(#shadow)"/>
                  <!-- Inner white circle -->
                  <circle cx="18" cy="18" r="7" fill="white" opacity="0.9"/>
                </svg>`;

            const blob = new Blob([svg], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const img = new Image(36, 48);
            img.onload = () => { callback(img); URL.revokeObjectURL(url); };
            img.src = url;
        }

        window.onload = function () {
            map = tt.map({
                key: window.tomtomKey,
                container: 'map',
                center: [121.07, 13.78],
                zoom: 13
            });

            map.on('load', function () {
                createPinImage('#22c55e', function (imgStart) {
                    map.addImage('pin-start', imgStart, { pixelRatio: 1 });
                    createPinImage('#ef4444', function (imgEnd) {
                        map.addImage('pin-end', imgEnd, { pixelRatio: 1 });
                        mapReady = true;
                        window.chrome.webview.postMessage("mapReady");
                    });
                });
            });
        };

        window.drawRoute = function (coords) {
            if (!mapReady) return;
            renderRoute(coords);
        };

        window.clearRoute = function () {
            ['route', 'route-start-pin', 'route-end-pin'].forEach(id => {
                if (map.getLayer(id)) map.removeLayer(id);
            });
            ['route', 'route-start', 'route-end'].forEach(id => {
                if (map.getSource(id)) map.removeSource(id);
            });
        };

        async function renderRoute(coords) {
            const startLng = coords[0][0];
            const startLat = coords[0][1];
            const endLng = coords[1][0];
            const endLat = coords[1][1];

            try {
                const url =
                    `https://api.tomtom.com/routing/1/calculateRoute/` +
                    `${startLat},${startLng}:${endLat},${endLng}/json?key=${window.tomtomKey}`;

                const response = await fetch(url);
                const data = await response.json();

                if (!data.routes || data.routes.length === 0) {
                    console.error("No routes returned");
                    return;
                }

                const points = data.routes[0].legs.flatMap(l => l.points);
                const lineCoords = points.map(p => [p.longitude, p.latitude]);

                // Clear existing
                ['route', 'route-start-pin', 'route-end-pin'].forEach(id => {
                    if (map.getLayer(id)) map.removeLayer(id);
                });
                ['route', 'route-start', 'route-end'].forEach(id => {
                    if (map.getSource(id)) map.removeSource(id);
                });

                // Route line
                map.addSource("route", {
                    type: "geojson",
                    data: {
                        type: "Feature",
                        geometry: { type: "LineString", coordinates: lineCoords }
                    }
                });
                map.addLayer({
                    id: "route",
                    type: "line",
                    source: "route",
                    paint: { "line-color": "#0066ff", "line-width": 5 }
                });

                map.addSource("route-start", {
                    type: "geojson",
                    data: {
                        type: "Feature",
                        geometry: { type: "Point", coordinates: [startLng, startLat] }
                    }
                });
                map.addLayer({
                    id: "route-start-pin",
                    type: "symbol",
                    source: "route-start",
                    layout: {
                        "icon-image": "pin-start",
                        "icon-size": 1,
                        "icon-anchor": "bottom",
                        "icon-allow-overlap": true
                    }
                });

                // End pin
                map.addSource("route-end", {
                    type: "geojson",
                    data: {
                        type: "Feature",
                        geometry: { type: "Point", coordinates: [endLng, endLat] }
                    }
                });
                map.addLayer({
                    id: "route-end-pin",
                    type: "symbol",
                    source: "route-end",
                    layout: {
                        "icon-image": "pin-end",
                        "icon-size": 1,
                        "icon-anchor": "bottom",
                        "icon-allow-overlap": true
                    }
                });

                const allCoords = [
                    [startLng, startLat],
                    ...lineCoords,
                    [endLng, endLat]
                ];

                const bounds = allCoords.reduce(
                    (b, c) => b.extend(c),
                    new tt.LngLatBounds(allCoords[0], allCoords[0])
                );

                map.fitBounds(bounds, {
                    padding: { top: 50, bottom: 40, left: 30, right: 30 },
                    maxZoom: 14
                });

                setTimeout(() => map.resize(), 100);

            } catch (err) {
                console.error("renderRoute error:", err);
            }
        }
    </script>
</body>
</html>
